<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Spotifer</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
</head>

<body>
    <div class="bg-gradient-to-b from-slate-900 to-pink-700 fixed inset-0 -z-10 "></div>
    <div class="text-white min-h-screen w-full">
        <!-- ส่วนหัว  -->
        <div class="flex flex-col items-center">
            <h1 class="text-2xl mt-5">สปูติฟี่ของฉัน</h1>
            <img class="w-[100px] rounded-full mt-4" src="https://picsum.photos/id/237/150" alt="profile">
            <button
                class="cursor-pointer mt-4 bg-black hover:bg-green-800 px-5 py-1 rounded-full text-white font-medium">Edit
                Profile</button>
        </div>

        <!-- ข้อมูลเลข -->
        <div class="flex justify-evenly mt-9">
            <div class="flex flex-col items-center">
                <p class="text-sm">23</p>
                <p class="text-xs text-slate-400">PLAYLISTS</p>
            </div>
            <div class="flex flex-col items-center">
                <p class="text-sm">58</p>
                <p class="text-xs text-slate-400">FOLLOWERS</p>
            </div>
            <div class="flex flex-col items-center">
                <p class="text-sm">23</p>
                <p class="text-xs text-slate-400">FOLLOWING</p>
            </div>
        </div>
        <!-- <hr> -->

        <!-- ส่วน play lists -->
        <div class="px-3">
            <p class="mt-5 ">Playlist</p>

            <div class="flex justify-between items-center">
                <div class="flex flex-row items-center mt-5">
                    <div>
                        <img class="w-[50px] rounded-md" src="https://picsum.photos/50" alt="">
                    </div>
                    <div class="flex flex-col ml-3">
                        <p>Album name</p>
                        <p class="text-xs text-slate-400">7 Like</p>
                    </div>
                </div>
                <div>
                    <i class="fa-solid fa-chevron-right text-slate-400"></i>
                </div>
            </div>

            <div class="flex justify-between items-center">
                <div class="flex flex-row items-center mt-3">
                    <div>
                        <img class="w-[50px] rounded-md" src="https://picsum.photos/50" alt="">
                    </div>
                    <div class="flex flex-col ml-3">
                        <p>Roadtrip</p>
                        <p class="text-xs text-slate-400">4 Like</p>
                    </div>
                </div>
                <div>
                    <i class="fa-solid fa-chevron-right text-slate-400"></i>
                </div>
            </div>

            <div class="flex justify-between items-center">
                <div class="flex flex-row items-center mt-3">
                    <div>
                        <img class="w-[50px] rounded-md" src="https://picsum.photos/50" alt="">
                    </div>
                    <div class="flex flex-col ml-3">
                        <p>Study</p>
                        <p class="text-xs text-slate-400">5 Like</p>
                    </div>
                </div>
                <div>
                    <i class="fa-solid fa-chevron-right text-slate-400"></i>
                </div>
            </div>

            <div class="flex justify-between items-center">
                <div class="mt-5">
                    <p>See all playlist</p>
                </div>
                <div>
                    <i class="fa-solid fa-chevron-right text-slate-400"></i>
                </div>
            </div>
        </div>

        <!-- ส่วน footer  -->
        <!-- <hr> -->
        <div class="flex justify-evenly fixed bottom-0 w-full py-3 pt-5 bg-black rounded-tl-2xl rounded-tr-2xl">
            <div class="flex flex-col items-center">
                <i class="fa-regular fa-house"></i>
                <p>Home</p>
            </div>
            <div class="flex flex-col items-center">
                <i class="fa-solid fa-magnifying-glass"></i>
                <p>Search</p>
            </div>
            <div class="flex flex-col items-center">
                <i class="fa-solid fa-book"></i>
                <p>Your Libary</p>
            </div>
        </div>
    </div>

</body>

</html>
